name: Actualizar datos Liga Cántabra

on:
  schedule:
    - cron: '0 7 * * *'   # 7:00 UTC = 8:00 España (CET) / 9:00 (CEST)
  workflow_dispatch:       # permite lanzarlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        run: python scraper_liga_cantabra.py --output docs

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/liga_cantabra_2026.json
          git diff --staged --quiet || (
            git commit -m "chore: actualizar datos $(date -u +'%Y-%m-%d')"
            git push
          )
